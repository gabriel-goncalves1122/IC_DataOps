version: '3.8'

# Os volumes nomeados garantem que os dados persistam sem depender
# de pastas específicas no computador de quem está rodando.
volumes:
  metadata_data: {}
  middle_var: {}
  historical_var: {}
  broker_var: {}
  coordinator_var: {}
  router_var: {}
  druid_shared: {}

networks:
  druid-net:
    driver: bridge

services:
  # =========================================
  # 1. ECOSSISTEMA KAFKA (Ultra-Leve)
  # =========================================
  zookeeper-kafka:
    image: confluentinc/cp-zookeeper:7.4.1
    container_name: zookeeper-kafka
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xms128M -Xmx128M"
      TZ: America/Sao_Paulo
    ports:
      - "22181:2181"
    networks:
      - druid-net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-kafka:2181
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx256M"
      TZ: America/Sao_Paulo
    depends_on:
      - zookeeper-kafka
    networks:
      - druid-net
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M

  # =========================================
  # 2. ECOSSISTEMA DRUID E METADADOS
  # =========================================
  postgres:
    container_name: postgres
    image: postgres:latest
    ports:
      - "5432:5432"
    volumes:
      - metadata_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: druid
      POSTGRES_USER: druid
      POSTGRES_DB: druid
      TZ: America/Sao_Paulo
    networks:
      - druid-net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 384M

  zookeeper:
    container_name: zookeeper
    image: zookeeper:3.5.10
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      JVMFLAGS: "-Xms128m -Xmx128m"
      TZ: America/Sao_Paulo
    networks:
      - druid-net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 384M

  coordinator:
    image: apache/druid:34.0.0
    container_name: coordinator
    user: "0:0"
    volumes:
      - druid_shared:/opt/shared
      - coordinator_var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
    ports:
      - "8081:8081"
    command:
      - coordinator
    env_file:
      - environment
    environment:
      JAVA_OPTS: "-Xms256m -Xmx256m"
      TZ: America/Sao_Paulo
    networks:
      - druid-net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  broker:
    image: apache/druid:34.0.0
    container_name: broker
    user: "0:0"
    volumes:
      - broker_var:/opt/druid/var
      - druid_shared:/opt/shared
    depends_on:
      - zookeeper
      - postgres
      - coordinator
    ports:
      - "8082:8082"
    command:
      - broker
    env_file:
      - environment
    environment:
      # Mantemos 1.5G de RAM, mas otimizamos a memória direta para os cálculos
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:MaxDirectMemorySize=768m"
      druid_processing_buffer_sizeBytes: 100000000  # Dobrei o buffer de leitura (100MB)
      druid_processing_numThreads: 3                # 3 NÚCLEOS DE PROCESSAMENTO!
      druid_processing_numMergeBuffers: 3           # 3 buffers de fusão de dados
      TZ: America/Sao_Paulo
    networks:
      - druid-net
    deploy:
      resources:
        limits:
          cpus: '3.0'                               # LIBERANDO 3 CORES DO HOST
          memory: 1.5G

  historical:
    image: apache/druid:34.0.0
    container_name: historical
    user: "0:0"
    volumes:
      - druid_shared:/opt/shared
      - historical_var:/opt/druid/var
    depends_on: 
      - zookeeper
      - postgres
      - coordinator
    ports:
      - "8083:8083"
    command:
      - historical
    env_file:
      - environment
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:MaxDirectMemorySize=768m"
      druid_processing_buffer_sizeBytes: 100000000
      druid_processing_numThreads: 3                # 3 NÚCLEOS PARA VARREDURA
      druid_processing_numMergeBuffers: 3
      TZ: America/Sao_Paulo
    networks:
      - druid-net
    deploy:
      resources:
        limits:
          cpus: '3.0'                               # LIBERANDO 3 CORES DO HOST
          memory: 1.5G

  middlemanager:
    image: apache/druid:34.0.0
    container_name: middlemanager
    user: "0:0"
    volumes:
      - druid_shared:/opt/shared
      - middle_var:/opt/druid/var
    depends_on: 
      - zookeeper
      - postgres
      - coordinator
    ports:
      - "8091:8091"
      - "8100-8105:8100-8105"
    command:
      - middleManager
    env_file:
      - environment
    environment:
      JAVA_OPTS: "-Xms64m -Xmx128m"
      druid_worker_capacity: 1
      druid_indexer_runner_javaOpts: "-Xms128m -Xmx128m -XX:MaxDirectMemorySize=64m"
      TZ: America/Sao_Paulo
    networks:
      - druid-net
    deploy:
      resources:
        limits:
          cpus: '0.5'           # ESTRANGULADO: A Ingestão já acabou, não precisamos dele roubando CPU
          memory: 512M          # RAM reduzida para poupar a máquina host

  router:
    image: apache/druid:34.0.0
    container_name: router
    user: "0:0"
    volumes:
      - router_var:/opt/druid/var
      - druid_shared:/opt/shared
    depends_on:
      - zookeeper
      - postgres
      - coordinator
      - broker
      - historical
    ports:
      - "8888:8888"
    command:
      - router
    env_file:
      - environment
    environment:
      JAVA_OPTS: "-Xms128m -Xmx128m"
      TZ: America/Sao_Paulo
    networks:
      - druid-net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # =========================================
  # 3. VISUALIZAÇÃO (SUPERSET)
  # =========================================
  superset:
    build: ./docker
    image: custom-superset:1.0
    container_name: superset
    ports:
      - "8088:8088"
    networks:
      - druid-net
    environment:
      SUPERSET_SECRET_KEY: "minha-chave-secreta-ic-dataops-unifei"
      TZ: America/Sao_Paulo
    depends_on:
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 768M